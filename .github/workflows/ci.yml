name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin manifest
        run: python3 -c "import json, sys; json.load(open('kleff-plugin.json')); print('manifest OK')"
